<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>HoneyDo</title>
<meta name="title" content="HoneyDo" />
<meta name="description" content="HoneyDo" />
<meta name="apple-mobile-web-app-title" content="HoneyDo" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="default" />
<meta property="og:type" content="website" />
<meta property="og:title" content="HoneyDo" />
<meta property="og:description" content="HoneyDo" />
<meta property="og:image" content="https://raw.githubusercontent.com/JRDN-R/HoneyDo/refs/heads/main/hero.jpg" />
<meta property="og:image:width" content="1200" />
<meta property="og:image:height" content="630" />
<meta name="twitter:card" content="summary_large_image" />
<meta name="twitter:title" content="HoneyDo" />
<meta name="twitter:description" content="HoneyDo" />
<meta name="twitter:image" content="https://raw.githubusercontent.com/JRDN-R/HoneyDo/refs/heads/main/hero.jpg" />
<link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon.png" />
<link rel="icon" type="image/png" sizes="180x180" href="apple-touch-icon.png" />
<link rel="shortcut icon" type="image/png" href="apple-touch-icon.png" />
<link rel="stylesheet" href="styles.css" />
<style>
  .completed-section {
    display: grid;
    gap: 12px;
    margin-top: 20px;
    padding-top: 18px;
    border-top: 1px solid rgba(45,151,85,.26);
  }
  .completed-heading {
    display: flex;
    align-items: center;
    gap: 10px;
    color: #2d9755;
    font-weight: 900;
    letter-spacing: -.02em;
  }
  .completed-check {
    width: 28px;
    height: 28px;
    border-radius: 999px;
    display: grid;
    place-items: center;
    background: rgba(45,151,85,.16);
    border: 1px solid rgba(45,151,85,.28);
  }
  .completed-count {
    color: var(--muted);
    font-weight: 800;
  }
  .task-card.done {
    opacity: 1;
    border-color: rgba(45,151,85,.34);
    background: rgba(45,151,85,.10);
  }
  .task-card.done h3 {
    text-decoration: none;
  }
  .completed-badge {
    color: #2d9755;
    border-color: rgba(45,151,85,.28);
    background: rgba(45,151,85,.12);
  }
</style>
</head>
<body>
<div class="app">
  <section id="loadingView" class="loading-screen">
    <div class="loading-card">
      <div class="loading-title">Opening Honey List</div>
      <div class="loading-text">Getting the shared list ready.</div>
      <div class="skeleton"></div>
    </div>
  </section>

  <main id="mainView" class="hide">
    <header class="hero">
      <img class="hero-icon" src="hicon.png" alt="" aria-hidden="true" />
      <h1>Honey<br>Do</h1>
    </header>

    <section id="requestView" class="view view-wrap active">
      <div class="panel">
        <div class="panel-title">
          <div>
            <p>Add something to the list.</p>
          </div>
        </div>

        <form id="taskForm">
          <input type="hidden" id="editingId" />

          <div class="field">
            <label for="title">Title</label>
            <input id="title" maxlength="80" placeholder="Example: Fix the playpen pipe" required />
          </div>

          <div class="field">
            <label for="description">Details</label>
            <textarea id="description" maxlength="1000" placeholder="Add anything helpful here."></textarea>
          </div>

          <div class="form-row">
            <div class="field">
              <label for="dueDate">Needs done by</label>
              <input id="dueDate" type="text" inputmode="none" placeholder="Tap to choose a date" />
            </div>

            <div class="field">
              <label for="category">Category</label>
              <select id="category">
                <option>Home</option>
                <option>Errand</option>
                <option>Kids</option>
                <option>Repair</option>
                <option>Church</option>
                <option>Other</option>
              </select>
            </div>
          </div>

          <label>Priority</label>
          <div class="priority-picker">
            <input id="priorityLow" type="radio" name="priority" value="1" />
            <label class="priority-choice" for="priorityLow">Low</label>

            <input id="priorityNormal" type="radio" name="priority" value="2" checked />
            <label class="priority-choice" for="priorityNormal">Normal</label>

            <input id="priorityHigh" type="radio" name="priority" value="3" />
            <label class="priority-choice" for="priorityHigh">High</label>
          </div>

          <button id="saveBtn" class="primary-btn" type="submit">Add to Honey List</button>

          <div class="secondary-row">
            <button id="resetBtn" class="ghost-btn" type="button">Clear</button>
          </div>

          <div id="formError" class="error"></div>
        </form>
      </div>
    </section>

    <section id="listView" class="view view-wrap">
      <div class="panel">
        <div class="panel-title">
          <div>
            <h2>Honey List</h2>
            <p>Everything that has been added.</p>
          </div>
        </div>

        <div class="toolbar">
          <select id="sortMode">
            <option value="smart">Smart sort</option>
            <option value="due">Due date</option>
            <option value="priority">Priority</option>
            <option value="newest">Newest first</option>
            <option value="oldest">Oldest first</option>
          </select>

          <button id="showOpenBtn" class="ghost-btn">Open only</button>
          <button id="showAllBtn" class="ghost-btn">Show all</button>

          <div id="taskCount" class="task-count">0 items</div>
        </div>

        <div id="tasks" class="tasks">
          <div class="empty">Nothing on the list yet.</div>
        </div>
      </div>
    </section>
  </main>
</div>

<div class="floating-nav">
  <div id="menu" class="menu">
    <button class="tab-btn" data-view="list">Honey List</button>
    <button class="tab-btn active" data-view="request">Put in a Request</button>

    <div class="menu-divider"></div>

    <button id="themeBtn" class="tab-btn theme-btn">
      <span>Theme</span>
      <span id="themeIcon">☀️</span>
    </button>
  </div>

  <button id="hamburger" class="hamburger" aria-label="Open menu">
    <span></span>
  </button>
</div>

<div id="toast" class="toast">Saved</div>
<script>
  const heroTitle = document.querySelector(".hero h1");
  const requestView = document.getElementById("requestView");
  const listView = document.getElementById("listView");

  function updateHeroTitle() {
    heroTitle.innerHTML = listView.classList.contains("active") ? "Honey<br>List" : "Honey<br>Do";
  }

  [requestView, listView].forEach((view) => {
    new MutationObserver(updateHeroTitle).observe(view, { attributes: true, attributeFilter: ["class"] });
  });

  updateHeroTitle();

  const safeDateInput = document.getElementById("dueDate");
  safeDateInput.addEventListener("focus", () => {
    safeDateInput.type = "date";
  });
  safeDateInput.addEventListener("blur", () => {
    safeDateInput.type = "text";
  });
</script>
<script type="module" src="app.js"></script>
<script>
  document.addEventListener("DOMContentLoaded", () => {
    const tasksEl = document.getElementById("tasks");
    const showAllBtn = document.getElementById("showAllBtn");
    let groupingCompleted = false;

    function organizeCompletedTasks() {
      if (groupingCompleted || !tasksEl) return;

      const completedCards = Array.from(tasksEl.children).filter((item) => item.classList?.contains("done"));
      if (!completedCards.length) return;

      groupingCompleted = true;

      const existingSection = tasksEl.querySelector(".completed-section");
      if (existingSection) existingSection.remove();

      const section = document.createElement("section");
      section.className = "completed-section";
      section.innerHTML = `<div class="completed-heading"><span class="completed-check">✓</span><span>Completed</span><span class="completed-count">${completedCards.length}</span></div>`;

      completedCards.forEach((card) => {
        if (!card.querySelector(".completed-badge")) {
          const meta = card.querySelector(".meta");
          if (meta) meta.insertAdjacentHTML("afterbegin", `<span class="pill completed-badge">✓ Completed</span>`);
        }
        section.appendChild(card);
      });

      tasksEl.appendChild(section);
      groupingCompleted = false;
    }

    const observer = new MutationObserver(() => requestAnimationFrame(organizeCompletedTasks));
    if (tasksEl) observer.observe(tasksEl, { childList: true });

    let attempts = 0;
    const showAllTimer = setInterval(() => {
      showAllBtn?.click();
      organizeCompletedTasks();
      attempts += 1;
      if (attempts >= 12) clearInterval(showAllTimer);
    }, 250);
  });
</script>
</body>
</html>
