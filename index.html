<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Honey Do List</title>
<link rel="stylesheet" href="styles.css" />
</head>
<body>
<div class="app">
  <section id="loadingView" class="loading-screen">
    <div class="loading-card">
      <div class="loading-title">Opening Honey List</div>
      <div class="loading-text">Getting the shared list ready.</div>
      <div class="skeleton"></div>
    </div>
  </section>

  <main id="mainView" class="hide">
    <header class="hero">
      <img class="hero-icon" src="hicon.png" alt="" aria-hidden="true" />
      <h1>Honey<br>List</h1>
    </header>

    <section id="requestView" class="view view-wrap active">
      <div class="panel">
        <div class="panel-title">
          <div>
            <h2>Honey Do</h2>
            <p>Add something to the list.</p>
          </div>
        </div>

        <form id="taskForm">
          <input type="hidden" id="editingId" />

          <div class="field">
            <label for="title">Title</label>
            <input id="title" maxlength="80" placeholder="Example: Fix the playpen pipe" required />
          </div>

          <div class="field">
            <label for="description">Details</label>
            <textarea id="description" maxlength="1000" placeholder="Add anything helpful here."></textarea>
          </div>

          <div class="form-row">
            <div class="field">
              <label for="dueDate">Needs done by</label>
              <input id="dueDate" type="date" />
            </div>

            <div class="field">
              <label for="category">Category</label>
              <select id="category">
                <option>Home</option>
                <option>Errand</option>
                <option>Kids</option>
                <option>Repair</option>
                <option>Church</option>
                <option>Other</option>
              </select>
            </div>
          </div>

          <label>Priority</label>
          <div class="priority-picker">
            <input id="priorityLow" type="radio" name="priority" value="1" />
            <label class="priority-choice" for="priorityLow">Low</label>

            <input id="priorityNormal" type="radio" name="priority" value="2" checked />
            <label class="priority-choice" for="priorityNormal">Normal</label>

            <input id="priorityHigh" type="radio" name="priority" value="3" />
            <label class="priority-choice" for="priorityHigh">High</label>
          </div>

          <button id="saveBtn" class="primary-btn" type="submit">Add to Honey List</button>

          <div class="secondary-row">
            <button id="resetBtn" class="ghost-btn" type="button">Clear</button>
          </div>

          <div id="formError" class="error"></div>
        </form>
      </div>
    </section>

    <section id="listView" class="view view-wrap">
      <div class="panel">
        <div class="panel-title">
          <div>
            <h2>Honey List</h2>
            <p>Everything that has been added.</p>
          </div>
        </div>

        <div class="toolbar">
          <select id="sortMode">
            <option value="smart">Smart sort</option>
            <option value="due">Due date</option>
            <option value="priority">Priority</option>
            <option value="newest">Newest first</option>
            <option value="oldest">Oldest first</option>
          </select>

          <button id="showOpenBtn" class="ghost-btn">Open only</button>
          <button id="showAllBtn" class="ghost-btn">Show all</button>

          <div id="taskCount" class="task-count">0 items</div>
        </div>

        <div id="tasks" class="tasks">
          <div class="empty">Nothing on the list yet.</div>
        </div>
      </div>
    </section>
  </main>
</div>

<div class="floating-nav">
  <div id="menu" class="menu">
    <button class="tab-btn" data-view="list">Honey List</button>
    <button class="tab-btn active" data-view="request">Put in a Request</button>

    <div class="menu-divider"></div>

    <button id="themeBtn" class="tab-btn theme-btn">
      <span>Theme</span>
      <span id="themeIcon">☀️</span>
    </button>
  </div>

  <button id="hamburger" class="hamburger" aria-label="Open menu">
    <span></span>
  </button>
</div>

<div id="toast" class="toast">Saved</div>
<script type="module" src="app.js"></script>
</body>
</html>
